# Cloudflare Pages configuration template for Botwin's Morning Wire.
# Replace the placeholder values below with your own Cloudflare resources.

name = "<your-pages-project>"
compatibility_date = "2025-06-19"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".output"

# Cloudflare Pages build output is produced by Nitro at `.output`.
# Deploy with: wrangler pages deploy .output --project-name=<your-pages-project>

[[kv_namespaces]]
binding = "KV"
id = "<your-kv-namespace-id>"

[[d1_databases]]
binding = "DB"
database_name = "<your-database-name>"
database_id = "<your-d1-database-id>"

[vars]
EDITION_SCHEMA_VERSION = "1.0.0"
SITE_URL = "https://<your-project>.pages.dev"

# Secrets (set via `wrangler secret put` or the Cloudflare dashboard):
#   ADMIN_TOKEN
